# Netlify deploy config for the Men in Cam SPA.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route renders index.html so React Router can handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the fingerprinted assets Vite emits.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
